apiVersion: v1
kind: Service
metadata:
  name: {{ include "data-bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-bridge.labels" . | nindent 4 }}
  {{- with include "data-bridge.annotations" . }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "data-bridge.selectorLabels" . | nindent 4 }}