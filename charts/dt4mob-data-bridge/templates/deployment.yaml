apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-bridge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "data-bridge.labels" . | nindent 4 }}
  {{- with include "data-bridge.annotations" . }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "data-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "data-bridge.selectorLabels" . | nindent 8 }}
      {{- with .Values.labels }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: {{ include "data-bridge.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "data-bridge.fullname" . }}
          env:
            {{- if .Values.existingSecret }}
            - name: DEVICES
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: devices
            {{- else }}
            - name: DEVICES
              value: '[]'
            {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
