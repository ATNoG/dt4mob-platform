global:
  tenant: "test-tenant"

image:
  repository: atnog-harbor.av.it.pt/dt4mob/data-bridge
  # This sets the pull policy for images.
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

schedule: "0 * * * *"

concurrencyPolicy: Forbid
successfulJobsHistoryLimit: 3 
failedJobsHistoryLimit: 1

logLevel: INFO

caCertSecretName: "{{ .Release.Name }}-root-ca-secret"

deviceCert:
  # existingSecret: ""
  issuer:
    group: cert-manager.io
    kind: Issuer
    name: "{{ .Release.Name }}-tenant-ca-issuer"

hono:
  http_adapter: "https://{{ .Release.Name }}-hono-adapter-http:8443"
  tenant_id: "{{ .Values.global.tenant }}"
  server_cert_path: "/run/secrets/hono/ca.crt"

devices: []
