# Default values for data-bridge helm chart.

# Registry image location — replace with your actual registry
image:
  repository: atnog-harbor.av.it.pt/dt4mob/data-bridge
  tag: latest
  pullPolicy: Always 

# Number of replicas.
replicaCount: 1

# Kubernetes Service settings.
service:
  type: ClusterIP
  port: 8000

# Application environment: dev | prod
# In dev mode, SSL verification is disabled for Hono requests.
env: dev

# Polling interval in seconds — how often the service fetches data from sources.
pollingInterval: 900

# Eclipse Hono connection settings.
# These point to the Hono services deployed in the same namespace.
hono:
  deviceRegistry: "http://dt4mob-hono-service-device-registry.dt4mob.svc.cluster.local:8443"
  httpAdapter: "http://dt4mob-hono-adapter-http.dt4mob.svc.cluster.local:8443"
  tenantId: "dt4mob"
  # serverCertPath: "/etc/certs/hono-ca.pem"  # optional mTLS CA certificate path

# File paths inside the container where GeoJSON data is mounted.
# Populate the charts/data-bridge/data/ directory with your GeoJSON files.
# See README for directory structure.
# signs:
#   dir: "/data/Signs"
# barriers:
#   dir: "/data/Barriers/Barreiras.geojson"
# equivia:
#   dir: "/data/Equivia"
# lights:
#   file: "/data/lights.geojson"

# Traffic sensor points — used to query Waze for live road data.
# tolls:
#   - name: SensorPoint1
#     road: VCI
#     latitude: 41.1453611
#     longitude: -8.5811944
#     areaRadius: 1000

# The name of an existing Kubernetes Secret containing device credentials.
# The secret must have a key named "devices" containing a JSON array.
# See the README for the expected secret format.
# Example: kubectl create secret generic data-bridge-devices --from-literal=devices='[{"type":"meteo","policyId":"meteo:default","passwd":"secret"}]'
existingSecret: ""

# Pod resource requests and limits.
resources: {}
#   requests:
#     memory: "64Mi"
#     cpu: "50m"
#   limits:
#     memory: "128Mi"
#     cpu: "200m"

# Pod scheduling preferences.
nodeSelector: {}
tolerations: []
affinity: {}

# Extra labels and annotations added to all resources.
labels: {}
annotations: {}
