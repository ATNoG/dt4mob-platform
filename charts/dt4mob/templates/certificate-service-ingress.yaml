apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dt4mob.fullname" . }}-certificate-service
  labels:
    {{- include "dt4mob.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ditto.ingress.className }}
  rules:
  - host: {{ .Values.global.host | quote }}
    http:
      paths:
      - path: /certificates
        pathType: Prefix
        backend:
          service:
            name: {{ include "dt4mob-certificate-service.fullname" (get .Subcharts "dt4mob-certificate-service") }}
            port:
              name: http
