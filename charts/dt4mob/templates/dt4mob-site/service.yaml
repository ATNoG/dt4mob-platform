apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "dt4mob.dt4mob-site.labels" . | nindent 4 }}
  name: {{ include "dt4mob.fullname" . }}-dt4mob-site
spec:
  selector:
	{{- include "dt4mob.dt4mob-site.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: http
      name: http
  type: ClusterIP
