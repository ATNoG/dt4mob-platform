apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dt4mob.fullname" . }}-keycloak
  labels:
    {{- include "dt4mob.keycloak.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ditto.ingress.className }}
  rules:
  - host: {{ .Values.ditto.ingress.host | quote }}
    http:
      paths:
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: {{ include "dt4mob.fullname" . }}-keycloak
            port:
              name: http
