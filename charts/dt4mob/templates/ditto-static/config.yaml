apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dt4mob.fullname" . }}-ditto-static-config
  labels:
    {{- include "dt4mob.ditto-static.labels" . | nindent 4 }}
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;

    error_log  /var/log/nginx/error.log notice;
    pid        /run/nginx.pid;

    events {
      worker_connections  1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;

      log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

      access_log  /var/log/nginx/access.log  main;

      sendfile        on;
      #tcp_nopush     on;

      keepalive_timeout  65;

      #gzip  on;

      server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        location / {
          map $http_x_forwarded_proto $real_scheme {
            default $http_x_forwarded_proto;
            ''      $scheme;
          }

          return 301 $real_scheme://$host/ui/?environmentsURL=/ui-environments.json&primaryEnvironmentName=dt4mob;
        }

        location /ui-environments.json {
          root   /usr/share/nginx/html;
          index  index.html index.htm;
        }
      }
    }
