apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dt4mob.fullname" . }}-ditto-static
  labels:
    {{- include "dt4mob.ditto-static.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ditto.ingress.className }}
  rules:
  - host: {{ .Values.ditto.ingress.host | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "dt4mob.fullname" . }}-ditto-static
            port:
              name: http

