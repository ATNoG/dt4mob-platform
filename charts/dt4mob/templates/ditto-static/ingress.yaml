apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dt4mob.fullname" . }}-ditto-static
  labels:
    {{- include "dt4mob.ditto-static.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: {{ .Values.ditto.ingress.className }}
  tls:
  - secretName: {{ include "dt4mob.fullname" . }}-ingress-tls
  rules:
  - host: {{ .Values.ditto.ingress.host | quote }}
    http:
      paths:
      - path: /ui($)
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ include "dt4mob.fullname" . }}-ditto-static
            port:
              name: http
      - path: /ui/environments\.json
        pathType: ImplementationSpecific
        backend:
          service:
            name: {{ include "dt4mob.fullname" . }}-ditto-static
            port:
              name: http

