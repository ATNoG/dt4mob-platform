{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
metadata:
  name: {{ include "dt4mob-certificate-service.serviceAccountName" . }}
  labels:
    {{- include "dt4mob-certificate-service.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dt4mob-certificate-service.fullname" . }}-role
  labels:
    {{- include "dt4mob-certificate-service.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: [{{ tpl .Values.config.secret.name . | quote }}]
  verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dt4mob-certificate-service.fullname" . }}-role-binding
  labels:
    {{- include "dt4mob-certificate-service.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "dt4mob-certificate-service.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "dt4mob-certificate-service.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
